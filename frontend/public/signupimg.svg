  <!-- Tagline -->
  <text x="200" y="456" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="500" fill="#F0E6D8">Your dream home, one click away.</text>
  <text x="200" y="476" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A07858" letter-spacing="2">FURNICART · PREMIUM FURNITURE</text>
